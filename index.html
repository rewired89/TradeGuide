<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TradeGuide — Markets to Algorithmic Trading</title>
  <meta name="description" content="Learn trading and algorithmic trading one concept at a time. From financial markets basics to building your own Python trading algorithms — short, real, built for your brain.">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <!-- ── Header ── -->
  <header>
    <button class="menu-btn" id="menuBtn" aria-label="Menu">☰</button>
    <a class="logo" href="#" onclick="location.reload()">Trade<span>Guide</span></a>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input
        type="search"
        id="search"
        placeholder="Search concepts — RSI, Sharpe, backtest, stop-loss..."
        autocomplete="off"
        spellcheck="false"
      >
    </div>
    <div class="header-right">
      <div class="progress-pill" id="progressPill">0/0 learned</div>
    </div>
  </header>

  <!-- ── Sidebar ── -->
  <div class="sidebar" id="sidebar" role="navigation" aria-label="Sections"></div>

  <!-- ── Main ── -->
  <main id="main" role="main"></main>

</div>

<script src="data.js"></script>
<script src="app.js"></script>

</html>
